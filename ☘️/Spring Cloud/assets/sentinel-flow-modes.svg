<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120">
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#e7dfd4" flood-opacity="0.9"/>
  </filter>
</defs>
<rect width="100%" height="100%" fill="#FEFCF8" rx="24"/>
<rect x="38" y="28" width="102" height="30" rx="8" fill="#E8C79A" transform="rotate(-16 89 43)" opacity="0.9"/>
<rect x="98" y="102" width="270" height="16" rx="8" fill="#F5E2A8" opacity="0.85"/>
<text x="92" y="88" font-size="34" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">Chapter</text>
<text x="232" y="88" font-size="38" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">Sentinel</text>
<text x="92" y="170" font-size="62" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">Sentinel 三种流控模式</text>
<text x="92" y="226" font-size="28" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">直接、关联、链路，关注点从资源本身逐步走向业务关系</text>
<path d="M 70 248 H 1490" stroke="#9B7C4D" stroke-width="3" stroke-dasharray="16 12" fill="none"/>
<circle cx="1496" cy="84" r="26" fill="#fff" stroke="#2A2724" stroke-width="3"/>
<circle cx="1486" cy="84" r="3.5" fill="#111111"/>
<circle cx="1506" cy="84" r="3.5" fill="#111111"/>
<path d="M1479 96 Q1496 108 1513 96" stroke="#111111" stroke-width="3" fill="none" stroke-linecap="round"/>
<g filter="url(#shadow)">
<rect x="86" y="320" width="430" height="500" rx="28" fill="#fffdf9" stroke="#2A2724" stroke-width="3.2"/>
</g>
<circle cx="130" cy="364" r="28" fill="#fff9eb" stroke="#2A2724" stroke-width="3"/>
<text x="120" y="375" font-size="30" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">1</text>
<text x="170" y="380" font-size="34" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">直接模式</text>
<text x="122" y="430" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">谁超限就限谁</text>
<text x="122" y="468" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">最常见，也最直观</text>
<text x="122" y="506" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">适合单接口自我保护</text><g filter="url(#shadow)">
<rect x="586" y="320" width="430" height="500" rx="28" fill="#fffdf9" stroke="#2A2724" stroke-width="3.2"/>
</g>
<circle cx="630" cy="364" r="28" fill="#fff9eb" stroke="#2A2724" stroke-width="3"/>
<text x="620" y="375" font-size="30" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">2</text>
<text x="670" y="380" font-size="34" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">关联模式</text>
<text x="622" y="430" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">为了保护更关键的资源</text>
<text x="622" y="468" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">限制和它争资源的接口</text>
<text x="622" y="506" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">常见于高优先级业务保底</text><g filter="url(#shadow)">
<rect x="1086" y="320" width="430" height="500" rx="28" fill="#fffdf9" stroke="#2A2724" stroke-width="3.2"/>
</g>
<circle cx="1130" cy="364" r="28" fill="#fff9eb" stroke="#2A2724" stroke-width="3"/>
<text x="1120" y="375" font-size="30" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">3</text>
<text x="1170" y="380" font-size="34" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">链路模式</text>
<text x="1122" y="430" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">同一资源从不同入口进入</text>
<text x="1122" y="468" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">按调用路径分别统计和限制</text>
<text x="1122" y="506" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">适合关键链路精细化保护</text><rect x="140" y="680" width="320" height="100" rx="20" fill="#fff" stroke="#2A2724" stroke-width="2.6"/>
<rect x="158" y="698" width="180" height="34" rx="12" fill="#F5E2A8" opacity="0.72"/>
<text x="164" y="723" font-size="26" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">例子</text>
<text x="164" y="766" font-size="22" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">商品列表太热，直接限商品列表</text><rect x="640" y="680" width="320" height="100" rx="20" fill="#fff" stroke="#2A2724" stroke-width="2.6"/>
<rect x="658" y="698" width="180" height="34" rx="12" fill="#F5E2A8" opacity="0.72"/>
<text x="664" y="723" font-size="26" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">例子</text>
<text x="664" y="766" font-size="22" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">限制商品查询，优先保下单</text><rect x="1140" y="680" width="320" height="100" rx="20" fill="#fff" stroke="#2A2724" stroke-width="2.6"/>
<rect x="1158" y="698" width="180" height="34" rx="12" fill="#F5E2A8" opacity="0.72"/>
<text x="1164" y="723" font-size="26" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">例子</text>
<text x="1164" y="766" font-size="22" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">下单链路里的 queryUser 单独控</text>
<g filter="url(#shadow)">
  <path d="M 530 1000 H 1070 L 1100 1026 L 1070 1054 H 530 L 500 1026 Z" fill="#f7e7b5" stroke="#2A2724" stroke-width="3"/>
</g>
<text x="632" y="1038" font-size="34" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">先理解直接，再理解关联和链路</text>
<rect x="82" y="958" width="1436" height="130" rx="28" fill="#fffdf9" stroke="#2A2724" stroke-width="2.8" stroke-dasharray="10 10"/>
<text x="150" y="1046" font-size="30" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">直接</text>
<path d="M 300 1032 H 390" stroke="#2A2724" stroke-width="4" fill="none"/>
<path d="M 374 1022 L 390 1032 L 374 1042" stroke="#2A2724" stroke-width="4" fill="none"/>
<text x="440" y="1046" font-size="30" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">关联</text>
<path d="M 590 1032 H 680" stroke="#2A2724" stroke-width="4" fill="none"/>
<path d="M 664 1022 L 680 1032 L 664 1042" stroke="#2A2724" stroke-width="4" fill="none"/>
<text x="730" y="1046" font-size="30" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">链路</text>
<path d="M 880 1032 H 970" stroke="#2A2724" stroke-width="4" fill="none"/>
<path d="M 954 1022 L 970 1032 L 954 1042" stroke="#2A2724" stroke-width="4" fill="none"/>
<text x="1020" y="1046" font-size="30" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">越往后越细</text></svg>