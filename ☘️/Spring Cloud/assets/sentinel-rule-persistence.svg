<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120">
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#e7dfd4" flood-opacity="0.9"/>
  </filter>
</defs>
<rect width="100%" height="100%" fill="#FEFCF8" rx="24"/>
<rect x="38" y="28" width="102" height="30" rx="8" fill="#E8C79A" transform="rotate(-16 89 43)" opacity="0.9"/>
<rect x="98" y="102" width="270" height="16" rx="8" fill="#F5E2A8" opacity="0.85"/>
<text x="92" y="88" font-size="34" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">Chapter</text>
<text x="232" y="88" font-size="38" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">规则持久化：pull</text>
<text x="92" y="170" font-size="62" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">规则持久化：pull 模式 与 push 模式</text>
<text x="92" y="226" font-size="28" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">学到这里，重点已经不是单条规则怎么配，而是规则怎么治理</text>
<path d="M 70 248 H 1490" stroke="#9B7C4D" stroke-width="3" stroke-dasharray="16 12" fill="none"/>
<circle cx="1496" cy="84" r="26" fill="#fff" stroke="#2A2724" stroke-width="3"/>
<circle cx="1486" cy="84" r="3.5" fill="#111111"/>
<circle cx="1506" cy="84" r="3.5" fill="#111111"/>
<path d="M1479 96 Q1496 108 1513 96" stroke="#111111" stroke-width="3" fill="none" stroke-linecap="round"/>
<g filter="url(#shadow)">
<rect x="90" y="320" width="300" height="460" rx="28" fill="#fffdf9" stroke="#2A2724" stroke-width="3.2"/>
</g>
<circle cx="134" cy="364" r="28" fill="#fff9eb" stroke="#2A2724" stroke-width="3"/>
<text x="124" y="375" font-size="30" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">1</text>
<text x="174" y="380" font-size="34" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">Dashboard / 配置中心</text>
<text x="126" y="430" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">统一维护流控、熔断等规则</text>
<text x="126" y="468" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">比只放在应用内存里更可靠</text><g filter="url(#shadow)">
<rect x="500" y="320" width="420" height="460" rx="28" fill="#fffdf9" stroke="#2A2724" stroke-width="3.2"/>
</g>
<circle cx="544" cy="364" r="28" fill="#fff9eb" stroke="#2A2724" stroke-width="3"/>
<text x="534" y="375" font-size="30" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">2</text>
<text x="584" y="380" font-size="34" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">pull 模式</text>
<text x="536" y="430" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">应用主动去拉规则</text>
<text x="536" y="468" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">重启后仍可重新加载</text>
<text x="536" y="506" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">统一来源清晰，但实时性相对弱</text><g filter="url(#shadow)">
<rect x="1032" y="320" width="420" height="460" rx="28" fill="#fffdf9" stroke="#2A2724" stroke-width="3.2"/>
</g>
<circle cx="1076" cy="364" r="28" fill="#fff9eb" stroke="#2A2724" stroke-width="3"/>
<text x="1066" y="375" font-size="30" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">3</text>
<text x="1116" y="380" font-size="34" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">push 模式</text>
<text x="1068" y="430" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">控制台或配置中心主动推送规则</text>
<text x="1068" y="468" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">修改后更快生效</text>
<text x="1068" y="506" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">更接近集中治理场景</text><path d="M 390 540 C 445.0 540, 445.0 540, 500 540" stroke="#2A2724" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M 482 530 L 500 540 L 482 550" stroke="#2A2724" stroke-width="4" fill="none" stroke-linecap="round"/>
<rect x="375.0" y="520.0" width="140" height="34" rx="12" fill="#E5F3EA"/>
<text x="393.0" y="544.0" font-size="20" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">应用主动拉</text><path d="M 390 620 C 711.0 620, 711.0 620, 1032 620" stroke="#2A2724" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M 1014 610 L 1032 620 L 1014 630" stroke="#2A2724" stroke-width="4" fill="none" stroke-linecap="round"/>
<rect x="641.0" y="600.0" width="140" height="34" rx="12" fill="#E5F3EA"/>
<text x="659.0" y="624.0" font-size="20" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">控制台主动推</text><rect x="330" y="820" width="920" height="110" rx="20" fill="#fff" stroke="#2A2724" stroke-width="2.6"/>
<rect x="348" y="838" width="180" height="34" rx="12" fill="#F5E2A8" opacity="0.72"/>
<text x="354" y="863" font-size="26" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">生产环境重点</text>
<text x="354" y="906" font-size="22" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">规则不能只存在内存里，要能统一管理、重启恢复、追踪变更。</text>
<g filter="url(#shadow)">
  <path d="M 530 1000 H 1070 L 1100 1026 L 1070 1054 H 530 L 500 1026 Z" fill="#f7e7b5" stroke="#2A2724" stroke-width="3"/>
</g>
<text x="632" y="1038" font-size="34" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">真正上线时，难点从配规则变成管规则</text>
<rect x="82" y="958" width="1436" height="130" rx="28" fill="#fffdf9" stroke="#2A2724" stroke-width="2.8" stroke-dasharray="10 10"/>
<text x="150" y="1046" font-size="30" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">规则中心</text>
<path d="M 300 1032 H 390" stroke="#2A2724" stroke-width="4" fill="none"/>
<path d="M 374 1022 L 390 1032 L 374 1042" stroke="#2A2724" stroke-width="4" fill="none"/>
<text x="440" y="1046" font-size="30" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">pull 主动拉</text>
<path d="M 590 1032 H 680" stroke="#2A2724" stroke-width="4" fill="none"/>
<path d="M 664 1022 L 680 1032 L 664 1042" stroke="#2A2724" stroke-width="4" fill="none"/>
<text x="730" y="1046" font-size="30" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">push 主动推</text>
<path d="M 880 1032 H 970" stroke="#2A2724" stroke-width="4" fill="none"/>
<path d="M 954 1022 L 970 1032 L 954 1042" stroke="#2A2724" stroke-width="4" fill="none"/>
<text x="1020" y="1046" font-size="30" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">实例统一更新</text></svg>