<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120">
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#e7dfd4" flood-opacity="0.9"/>
  </filter>
</defs>
<rect width="100%" height="100%" fill="#FEFCF8" rx="24"/>
<rect x="38" y="28" width="102" height="30" rx="8" fill="#E8C79A" transform="rotate(-16 89 43)" opacity="0.9"/>
<rect x="98" y="102" width="270" height="16" rx="8" fill="#F5E2A8" opacity="0.85"/>
<text x="92" y="88" font-size="34" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">Chapter</text>
<text x="232" y="88" font-size="38" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">Sentinel</text>
<text x="92" y="170" font-size="62" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">Sentinel 为什么必要</text>
<text x="92" y="226" font-size="28" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">流量升高或下游变慢之后，故障为什么会一层层放大</text>
<path d="M 70 248 H 1490" stroke="#9B7C4D" stroke-width="3" stroke-dasharray="16 12" fill="none"/>
<circle cx="1496" cy="84" r="26" fill="#fff" stroke="#2A2724" stroke-width="3"/>
<circle cx="1486" cy="84" r="3.5" fill="#111111"/>
<circle cx="1506" cy="84" r="3.5" fill="#111111"/>
<path d="M1479 96 Q1496 108 1513 96" stroke="#111111" stroke-width="3" fill="none" stroke-linecap="round"/>
<g filter="url(#shadow)">
<rect x="80" y="300" width="260" height="500" rx="28" fill="#fffdf9" stroke="#2A2724" stroke-width="3.2"/>
</g>
<circle cx="124" cy="344" r="28" fill="#fff9eb" stroke="#2A2724" stroke-width="3"/>
<text x="114" y="355" font-size="30" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">1</text>
<text x="164" y="360" font-size="34" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">问题起点</text>
<text x="116" y="410" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">请求量突然升高</text>
<text x="116" y="448" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">或者下游服务开始变慢</text>
<text x="116" y="486" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">这时系统还没挂，</text>
<text x="116" y="524" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">但风险已经开始积累</text><g filter="url(#shadow)">
<rect x="390" y="300" width="260" height="500" rx="28" fill="#fffdf9" stroke="#2A2724" stroke-width="3.2"/>
</g>
<circle cx="434" cy="344" r="28" fill="#fff9eb" stroke="#2A2724" stroke-width="3"/>
<text x="424" y="355" font-size="30" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">2</text>
<text x="474" y="360" font-size="34" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">资源被占住</text>
<text x="426" y="410" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">线程、连接、CPU</text>
<text x="426" y="448" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">都被慢请求持续占用</text>
<text x="426" y="486" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">上游等待时间不断增长</text><g filter="url(#shadow)">
<rect x="700" y="300" width="260" height="500" rx="28" fill="#fffdf9" stroke="#2A2724" stroke-width="3.2"/>
</g>
<circle cx="744" cy="344" r="28" fill="#fff9eb" stroke="#2A2724" stroke-width="3"/>
<text x="734" y="355" font-size="30" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">3</text>
<text x="784" y="360" font-size="34" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">请求开始堆积</text>
<text x="736" y="410" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">超时增多</text>
<text x="736" y="448" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">队列变长</text>
<text x="736" y="486" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">重试开始出现</text><g filter="url(#shadow)">
<rect x="1010" y="300" width="260" height="500" rx="28" fill="#fffdf9" stroke="#2A2724" stroke-width="3.2"/>
</g>
<circle cx="1054" cy="344" r="28" fill="#fff9eb" stroke="#2A2724" stroke-width="3"/>
<text x="1044" y="355" font-size="30" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">4</text>
<text x="1094" y="360" font-size="34" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">故障扩散</text>
<text x="1046" y="410" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">更多并发进一步压垮系统</text>
<text x="1046" y="448" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">局部故障放大成雪崩</text>
<text x="1046" y="486" font-size="24" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">整条调用链一起抖动</text><path d="M 340 550 C 365.0 550, 365.0 550, 390 550" stroke="#2A2724" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M 372 540 L 390 550 L 372 560" stroke="#2A2724" stroke-width="4" fill="none" stroke-linecap="round"/><path d="M 650 550 C 675.0 550, 675.0 550, 700 550" stroke="#2A2724" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M 682 540 L 700 550 L 682 560" stroke="#2A2724" stroke-width="4" fill="none" stroke-linecap="round"/><path d="M 960 550 C 985.0 550, 985.0 550, 1010 550" stroke="#2A2724" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M 992 540 L 1010 550 L 992 560" stroke="#2A2724" stroke-width="4" fill="none" stroke-linecap="round"/><rect x="1290" y="380" width="210" height="260" rx="20" fill="#fff" stroke="#2A2724" stroke-width="2.6"/>
<rect x="1308" y="398" width="174" height="34" rx="12" fill="#F5E2A8" opacity="0.72"/>
<text x="1314" y="423" font-size="26" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">Sentinel 做什么</text>
<text x="1314" y="466" font-size="22" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">限流，先拦住过量请求</text>
<text x="1314" y="498" font-size="22" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">熔断，先别继续打故障点</text>
<text x="1314" y="530" font-size="22" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#4A443D">降级，给用户可接受结果</text>
<g filter="url(#shadow)">
  <path d="M 530 1000 H 1070 L 1100 1026 L 1070 1054 H 530 L 500 1026 Z" fill="#f7e7b5" stroke="#2A2724" stroke-width="3"/>
</g>
<text x="632" y="1038" font-size="34" font-weight="700" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">一条主线记忆</text>
<rect x="82" y="958" width="1436" height="130" rx="28" fill="#fffdf9" stroke="#2A2724" stroke-width="2.8" stroke-dasharray="10 10"/>
<text x="150" y="1046" font-size="30" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">流量/慢调用</text>
<path d="M 300 1032 H 390" stroke="#2A2724" stroke-width="4" fill="none"/>
<path d="M 374 1022 L 390 1032 L 374 1042" stroke="#2A2724" stroke-width="4" fill="none"/>
<text x="440" y="1046" font-size="30" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">资源被占</text>
<path d="M 590 1032 H 680" stroke="#2A2724" stroke-width="4" fill="none"/>
<path d="M 664 1022 L 680 1032 L 664 1042" stroke="#2A2724" stroke-width="4" fill="none"/>
<text x="730" y="1046" font-size="30" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">请求堆积</text>
<path d="M 880 1032 H 970" stroke="#2A2724" stroke-width="4" fill="none"/>
<path d="M 954 1022 L 970 1032 L 954 1042" stroke="#2A2724" stroke-width="4" fill="none"/>
<text x="1020" y="1046" font-size="30" font-family="PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif fill="#111111">故障扩散</text></svg>